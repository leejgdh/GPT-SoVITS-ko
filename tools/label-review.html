<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASR 라벨 검수</title>
<style>
  :root {
    --bg: #f5f5f5;
    --surface: #ffffff;
    --border: #d0d0d0;
    --text: #333333;
    --text-dim: #777777;
    --accent: #2563eb;
    --pending: #d97706;
    --approved: #16a34a;
    --rejected: #dc2626;
    --danger: #b91c1c;
    --hover: #e8e8e8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── 상단 바 ── */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .toolbar label {
    font-size: 13px;
    color: var(--text-dim);
  }

  .toolbar input, .toolbar select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 4px;
    font-size: 13px;
  }

  .toolbar input:focus, .toolbar select:focus {
    outline: none;
    border-color: var(--accent);
  }

  #server-url { width: 240px; }

  .badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 600;
  }

  .badge.pending  { background: var(--pending); color: #fff; }
  .badge.approved { background: var(--approved); color: #fff; }
  .badge.rejected { background: var(--rejected); color: #fff; }

  .toolbar-right {
    margin-left: auto;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  /* ── 필터 바 ── */
  .filter-bar {
    display: flex;
    gap: 8px;
    padding: 8px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    align-items: center;
  }

  .filter-bar button {
    padding: 4px 12px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 12px;
  }

  .filter-bar button.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(74, 158, 255, 0.1);
  }

  .filter-bar button:hover { border-color: var(--accent); }

  .batch-del-btn {
    border-color: var(--rejected) !important;
    color: var(--rejected) !important;
  }
  .batch-del-btn:hover {
    background: rgba(231, 76, 60, 0.15) !important;
  }

  /* ── 메인 컨텐츠 ── */
  .container {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 90px);
  }

  /* ── 라벨 테이블 ── */
  .table-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 0 20px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }

  thead th {
    position: sticky;
    top: 0;
    background: var(--surface);
    padding: 10px 8px;
    text-align: left;
    font-size: 12px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    z-index: 1;
  }

  /* 컬럼 너비 */
  .col-idx   { width: 40px; }
  .col-play  { width: 50px; }
  .col-wave  { width: 260px; }
  .col-text  { /* flex */ }
  .col-lang  { width: 50px; }
  .col-emo   { width: 160px; }
  .col-del   { width: 40px; }

  .wave-state-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* 파형 */
  .waveform {
    width: 150px;
    height: 32px;
    border-radius: 4px;
    background: var(--bg);
    cursor: pointer;
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  tbody tr:hover { background: var(--hover); }

  td {
    padding: 6px 8px;
    font-size: 13px;
    vertical-align: middle;
  }

  .idx { color: var(--text-dim); font-size: 12px; }

  /* 재생 버튼 */
  .play-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.15s;
  }

  .play-btn:hover { opacity: 0.8; }
  .play-btn.playing { background: var(--pending); }

  /* 텍스트 편집 */
  .text-input {
    width: 100%;
    background: transparent;
    border: 1px solid transparent;
    color: var(--text);
    padding: 4px 6px;
    border-radius: 4px;
    font-size: 13px;
    font-family: inherit;
  }

  .text-input:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--bg);
  }

  .text-input.modified {
    border-color: var(--pending);
  }

  /* 상태 버튼 */
  .state-btns {
    display: flex;
    gap: 4px;
  }

  .state-btn {
    padding: 3px 8px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 11px;
    transition: all 0.15s;
  }

  .state-btn:hover { border-color: var(--text); color: var(--text); }
  .state-btn.active-pending  { border-color: var(--pending);  color: var(--pending);  background: rgba(240, 165, 0, 0.15); }
  .state-btn.active-approved { border-color: var(--approved); color: var(--approved); background: rgba(46, 204, 113, 0.15); }
  .state-btn.active-rejected { border-color: var(--rejected); color: var(--rejected); background: rgba(231, 76, 60, 0.15); }

  /* 감정 셀 */
  .emo-cell {
    display: flex;
    gap: 4px;
    align-items: center;
  }

  .emo-select {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 3px 6px;
    border-radius: 3px;
    font-size: 11px;
  }

  .emo-select:focus { outline: none; border-color: var(--accent); }

  .emo-add-btn {
    padding: 3px 6px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--accent);
    cursor: pointer;
    font-size: 11px;
  }

  .emo-add-btn:hover { border-color: var(--accent); }

  /* 삭제 */
  .del-btn {
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 16px;
    padding: 4px;
    border-radius: 4px;
  }

  .del-btn:hover { color: var(--rejected); background: rgba(231, 76, 60, 0.15); }

  /* ── 감정 패널 ── */
  .emotion-panel {
    padding: 12px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    max-height: 200px;
    overflow-y: auto;
  }

  .emotion-panel h3 {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .emo-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .emo-card {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 12px;
  }

  .emo-card .emo-name {
    font-weight: 600;
    color: var(--accent);
  }

  .emo-card .emo-info {
    color: var(--text-dim);
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .emo-card .emo-del {
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 14px;
    padding: 0 2px;
  }

  .emo-card .emo-del:hover { color: var(--rejected); }

  /* ── 상태 메시지 ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    font-size: 14px;
  }

  /* 토스트 */
  .toast-container {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .toast {
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 12px;
    animation: fadeIn 0.2s, fadeOut 0.3s 2.5s forwards;
    max-width: 320px;
  }

  .toast.success { background: var(--approved); color: #000; }
  .toast.error   { background: var(--rejected); color: #fff; }

  @keyframes fadeIn  { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
</style>
</head>
<body>

<!-- 상단 바 -->
<div class="toolbar">
  <label>서버</label>
  <input type="text" id="server-url" value="http://localhost:9880" placeholder="http://localhost:9880">
  <label>Voice</label>
  <select id="voice-select"><option value="">연결 대기...</option></select>
  <div class="toolbar-right">
    <span class="badge pending"  id="cnt-pending">0</span>
    <span class="badge approved" id="cnt-approved">0</span>
    <span class="badge rejected" id="cnt-rejected">0</span>
  </div>
</div>

<!-- 필터 바 -->
<div class="filter-bar">
  <button class="active" data-filter="all">전체</button>
  <button data-filter="pending">Pending</button>
  <button data-filter="approved">Approved</button>
  <button data-filter="rejected">Rejected</button>
  <span style="margin-left:auto">
    <button class="batch-del-btn" onclick="deleteEmptyLabels()">빈 텍스트 일괄 삭제</button>
  </span>
</div>

<!-- 메인 -->
<div class="container">
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="col-idx">#</th>
          <th class="col-play"></th>
          <th class="col-wave">파형</th>
          <th class="col-text">텍스트</th>
          <th class="col-lang">언어</th>
          <th class="col-emo">감정 매핑</th>
          <th class="col-del"></th>
        </tr>
      </thead>
      <tbody id="label-body"></tbody>
    </table>
    <div class="empty-state" id="empty-msg">서버에 연결하면 라벨 목록이 표시됩니다.</div>
  </div>

  <!-- 감정 패널 -->
  <div class="emotion-panel" id="emotion-panel" style="display:none">
    <h3>감정 매핑</h3>
    <div class="emo-list" id="emo-list"></div>
  </div>
</div>

<!-- 토스트 -->
<div class="toast-container" id="toasts"></div>

<!-- 숨겨진 오디오 -->
<audio id="audio-player" style="display:none"></audio>

<script>
const $ = (s) => document.querySelector(s);
const $$ = (s) => document.querySelectorAll(s);

let BASE = '';
let currentVoice = '';
let labels = [];
let emotions = {};
let currentFilter = 'all';
let playingIndex = -1;
const audio = $('#audio-player');
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const waveCache = new Map(); // index → AudioBuffer
let waveObserver = null;

// ── 유틸 ──

function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  return fetch(BASE + path, opts).then(r => {
    if (!r.ok) return r.json().then(e => Promise.reject(e));
    return r.json();
  });
}

function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  $('#toasts').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ── 초기화 ──

$('#server-url').addEventListener('change', connect);
$('#voice-select').addEventListener('change', () => {
  currentVoice = $('#voice-select').value;
  if (currentVoice) loadLabels();
});

document.addEventListener('DOMContentLoaded', connect);

async function connect() {
  BASE = $('#server-url').value.replace(/\/+$/, '');
  try {
    const data = await api('GET', '/voices');
    const sel = $('#voice-select');
    sel.innerHTML = '<option value="">선택...</option>';
    const voices = data.voices || [];
    voices.forEach(v => {
      const opt = document.createElement('option');
      opt.value = v.name || v;
      opt.textContent = v.name || v;
      sel.appendChild(opt);
    });
    if (data.current_voice) {
      sel.value = data.current_voice;
      currentVoice = data.current_voice;
      loadLabels();
    }
    toast('서버 연결됨');
  } catch {
    toast('서버 연결 실패', 'error');
  }
}

// ── 라벨 로드 ──

async function loadLabels() {
  if (!currentVoice) return;
  try {
    const data = await api('GET', `/voices/${currentVoice}/labels`);
    labels = data.labels || [];
    updateCounts(data.counts || {});
    renderLabels();
    loadEmotions();
  } catch (e) {
    toast('라벨 로드 실패: ' + (e.detail || e.message || ''), 'error');
  }
}

function updateCounts(counts) {
  $('#cnt-pending').textContent = counts.pending || 0;
  $('#cnt-approved').textContent = counts.approved || 0;
  $('#cnt-rejected').textContent = counts.rejected || 0;
}

// ── 필터 ──

$$('.filter-bar button').forEach(btn => {
  btn.addEventListener('click', () => {
    $$('.filter-bar button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderLabels();
  });
});

// ── 라벨 렌더 ──

function renderLabels() {
  const body = $('#label-body');
  const filtered = currentFilter === 'all'
    ? labels
    : labels.filter(l => l.state === currentFilter);

  if (filtered.length === 0) {
    body.innerHTML = '';
    $('#empty-msg').style.display = 'block';
    $('#empty-msg').textContent = labels.length === 0
      ? '라벨이 없습니다.'
      : `${currentFilter} 상태의 라벨이 없습니다.`;
    return;
  }

  $('#empty-msg').style.display = 'none';

  body.innerHTML = filtered.map(l => `
    <tr data-idx="${l.index}" data-state="${l.state}">
      <td class="idx">${l.index}</td>
      <td>
        <button class="play-btn ${playingIndex === l.index ? 'playing' : ''}"
                onclick="togglePlay(${l.index})" title="재생">
          ${playingIndex === l.index ? '■' : '▶'}
        </button>
      </td>
      <td>
        <div class="wave-state-group">
          <canvas class="waveform" data-wave-idx="${l.index}"
                  width="150" height="32"
                  onclick="togglePlay(${l.index})"></canvas>
          <div class="state-btns">
            <button class="state-btn ${l.state === 'pending' ? 'active-pending' : ''}"
                    onclick="setState(${l.index},'pending')">P</button>
            <button class="state-btn ${l.state === 'approved' ? 'active-approved' : ''}"
                    onclick="setState(${l.index},'approved')">A</button>
            <button class="state-btn ${l.state === 'rejected' ? 'active-rejected' : ''}"
                    onclick="setState(${l.index},'rejected')">R</button>
          </div>
        </div>
      </td>
      <td>
        <input class="text-input" value="${escHtml(l.text)}"
               data-original="${escHtml(l.text)}"
               onblur="saveText(${l.index}, this)"
               onkeydown="if(event.key==='Enter'){this.blur()}"
               oninput="this.classList.toggle('modified', this.value !== this.dataset.original)">
      </td>
      <td style="color:var(--text-dim)">${l.lang}</td>
      <td>
        <div class="emo-cell">
          <select class="emo-select" onchange="mapEmotion(${l.index}, this.value)">
            <option value="">-</option>
            ${emotionOptions(l.index)}
          </select>
          <button class="emo-add-btn" onclick="addNewEmotion(${l.index})" title="새 감정">+</button>
        </div>
      </td>
      <td>
        <button class="del-btn" onclick="deleteLabel(${l.index})" title="삭제">&times;</button>
      </td>
    </tr>
  `).join('');

  // 파형 lazy loading
  observeWaveforms();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── 파형 ──

function observeWaveforms() {
  if (waveObserver) waveObserver.disconnect();
  waveObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const canvas = entry.target;
      const idx = parseInt(canvas.dataset.waveIdx);
      waveObserver.unobserve(canvas);
      loadWaveform(idx, canvas);
    });
  }, { root: $('.table-wrap'), threshold: 0.1 });

  document.querySelectorAll('.waveform').forEach(c => waveObserver.observe(c));
}

async function loadWaveform(index, canvas) {
  try {
    let buf = waveCache.get(index);
    if (!buf) {
      const res = await fetch(`${BASE}/voices/${currentVoice}/labels/${index}/audio`);
      const arrayBuf = await res.arrayBuffer();
      buf = await audioCtx.decodeAudioData(arrayBuf);
      waveCache.set(index, buf);
    }
    drawWaveform(canvas, buf);
  } catch {
    // 디코딩 실패 = 깨진 파일 → 빨간 표시
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = 'rgba(231, 76, 60, 0.3)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#e74c3c';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('decode error', canvas.width / 2, canvas.height / 2 + 3);
  }
}

function drawWaveform(canvas, audioBuffer) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width;
  const h = canvas.height;
  const data = audioBuffer.getChannelData(0);
  const step = Math.ceil(data.length / w);
  const mid = h / 2;

  ctx.clearRect(0, 0, w, h);

  // RMS 기반 파형
  const color = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
  ctx.strokeStyle = color;
  ctx.lineWidth = 1;
  ctx.beginPath();

  for (let i = 0; i < w; i++) {
    const start = i * step;
    let min = 1, max = -1;
    for (let j = 0; j < step && start + j < data.length; j++) {
      const v = data[start + j];
      if (v < min) min = v;
      if (v > max) max = v;
    }
    const y1 = mid + min * mid;
    const y2 = mid + max * mid;
    ctx.moveTo(i, y1);
    ctx.lineTo(i, y2);
  }
  ctx.stroke();
}

function emotionOptions(labelIndex) {
  const emoNames = Object.keys(emotions);
  if (emoNames.length === 0) return '';
  // 이 라벨에 매핑된 감정 찾기
  const mapped = findMappedEmotion(labelIndex);
  return emoNames.map(name =>
    `<option value="${name}" ${name === mapped ? 'selected' : ''}>${name}</option>`
  ).join('');
}

function findMappedEmotion(labelIndex) {
  const label = labels.find(l => l.index === labelIndex);
  if (!label) return '';
  for (const [emo, ref] of Object.entries(emotions)) {
    if (ref.ref_audio && label.audio_file &&
        ref.ref_audio === label.audio_file.split('/').pop()) {
      return emo;
    }
  }
  return '';
}

// ── 오디오 재생 ──

function togglePlay(index) {
  if (playingIndex === index) {
    audio.pause();
    audio.currentTime = 0;
    playingIndex = -1;
    renderLabels();
    return;
  }
  playingIndex = index;
  audio.src = `${BASE}/voices/${currentVoice}/labels/${index}/audio`;
  audio.play().catch(() => toast('오디오 재생 실패', 'error'));
  renderLabels();
}

audio.addEventListener('ended', () => {
  playingIndex = -1;
  renderLabels();
});

// ── 텍스트 수정 ──

async function saveText(index, input) {
  const newText = input.value.trim();
  const original = input.dataset.original;
  if (newText === original || !newText) {
    input.value = original;
    input.classList.remove('modified');
    return;
  }
  try {
    await api('PUT', `/voices/${currentVoice}/labels/${index}`, { text: newText });
    input.dataset.original = newText;
    input.classList.remove('modified');
    const label = labels.find(l => l.index === index);
    if (label) label.text = newText;
    toast('텍스트 수정됨');
  } catch {
    toast('텍스트 수정 실패', 'error');
    input.value = original;
    input.classList.remove('modified');
  }
}

// ── 상태 변경 ──

async function setState(index, state) {
  const label = labels.find(l => l.index === index);
  if (label && label.state === state) return;
  try {
    const res = await api('PATCH', `/voices/${currentVoice}/labels/${index}/state`, { state });
    if (label) label.state = res.new_state;
    updateCountsFromLabels();
    renderLabels();
    toast(`#${index} → ${state}`);
  } catch {
    toast('상태 변경 실패', 'error');
  }
}

function updateCountsFromLabels() {
  const counts = { pending: 0, approved: 0, rejected: 0 };
  labels.forEach(l => { if (counts[l.state] !== undefined) counts[l.state]++; });
  updateCounts(counts);
}

// ── 라벨 삭제 ──

async function deleteLabel(index) {
  if (!confirm(`#${index} 라벨을 삭제하시겠습니까?\n오디오 파일도 함께 삭제됩니다.`)) return;
  try {
    await api('DELETE', `/voices/${currentVoice}/labels/${index}`);
    toast(`#${index} 삭제됨`);
    loadLabels();
  } catch {
    toast('삭제 실패', 'error');
  }
}

// ── 빈 텍스트 일괄 삭제 ──

async function deleteEmptyLabels() {
  const empties = labels.filter(l => !l.text.trim());
  if (empties.length === 0) {
    toast('빈 텍스트가 없습니다');
    return;
  }
  if (!confirm(`빈 텍스트 ${empties.length}개를 삭제하시겠습니까?\n오디오 파일도 함께 삭제됩니다.`)) return;

  // 인덱스 역순으로 삭제 (앞에서 삭제하면 뒤 인덱스가 밀림)
  const sorted = empties.map(l => l.index).sort((a, b) => b - a);
  let deleted = 0;
  for (const idx of sorted) {
    try {
      await api('DELETE', `/voices/${currentVoice}/labels/${idx}`);
      deleted++;
    } catch {
      toast(`#${idx} 삭제 실패`, 'error');
    }
  }
  toast(`빈 텍스트 ${deleted}개 삭제됨`);
  loadLabels();
}

// ── 감정 매핑 ──

async function loadEmotions() {
  try {
    const data = await api('GET', `/voices/${currentVoice}/emotions`);
    emotions = data.emotions || {};
    renderEmotions();
    renderLabels();
  } catch {
    emotions = {};
  }
}

function renderEmotions() {
  const panel = $('#emotion-panel');
  const list = $('#emo-list');
  const entries = Object.entries(emotions);

  if (entries.length === 0) {
    panel.style.display = 'none';
    return;
  }

  panel.style.display = 'block';
  list.innerHTML = entries.map(([name, ref]) => `
    <div class="emo-card">
      <span class="emo-name">${escHtml(name)}</span>
      <span class="emo-info" title="${escHtml(ref.ref_text || '')}">${escHtml(ref.ref_audio || '')}</span>
      <button class="emo-del" data-emotion="${escHtml(name)}" title="삭제">&times;</button>
    </div>
  `).join('');
  list.querySelectorAll('.emo-del').forEach(btn => {
    btn.addEventListener('click', () => deleteEmotion(btn.dataset.emotion));
  });
}

async function mapEmotion(labelIndex, emotionName) {
  if (!emotionName) return;
  try {
    await api('PUT', `/voices/${currentVoice}/emotions/${emotionName}`, { label_index: labelIndex });
    toast(`#${labelIndex} → ${emotionName} 매핑됨`);
    loadEmotions();
  } catch (e) {
    toast('매핑 실패: ' + (e.detail || ''), 'error');
    loadEmotions();
  }
}

async function addNewEmotion(labelIndex) {
  const name = prompt('감정 이름을 입력하세요 (예: happy, sad, angry):');
  if (!name || !name.trim()) return;
  await mapEmotion(labelIndex, name.trim());
}

async function deleteEmotion(name) {
  if (!confirm(`'${name}' 감정 매핑을 삭제하시겠습니까?`)) return;
  try {
    await api('DELETE', `/voices/${currentVoice}/emotions/${name}`);
    toast(`${name} 삭제됨`);
    loadEmotions();
  } catch (e) {
    toast('삭제 실패: ' + (e.detail || ''), 'error');
  }
}
</script>
</body>
</html>
