<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Checker — 라벨링</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --border: #0f3460;
    --text: #e0e0e0;
    --text-dim: #8a8a9a;
    --accent: #4a9eff;
    --good: #2ecc71;
    --bad: #e74c3c;
    --unlabeled: #f0a500;
    --hover: #1a2a4e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── 상단 바 ── */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .toolbar label { font-size: 13px; color: var(--text-dim); }

  .toolbar input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 4px;
    font-size: 13px;
  }

  .toolbar input:focus { outline: none; border-color: var(--accent); }
  #server-url { width: 240px; }

  .badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 600;
  }

  .badge.good      { background: var(--good); color: #000; }
  .badge.bad        { background: var(--bad); color: #fff; }
  .badge.unlabeled  { background: var(--unlabeled); color: #000; }

  .toolbar-right {
    margin-left: auto;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  /* ── 필터 바 ── */
  .filter-bar {
    display: flex;
    gap: 8px;
    padding: 8px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    align-items: center;
  }

  .filter-bar button {
    padding: 4px 12px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 12px;
  }

  .filter-bar button.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(74, 158, 255, 0.1);
  }

  .filter-bar button:hover { border-color: var(--accent); }

  .shortcut-hint {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-dim);
  }

  kbd {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 5px;
    font-size: 10px;
    font-family: monospace;
  }

  /* ── 메인 컨텐츠 ── */
  .container {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 90px);
  }

  .table-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 0 20px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }

  thead th {
    position: sticky;
    top: 0;
    background: var(--surface);
    padding: 10px 8px;
    text-align: left;
    font-size: 12px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    z-index: 1;
  }

  .col-idx   { width: 40px; }
  .col-play  { width: 50px; }
  .col-wave  { /* flex: waveform + label buttons */ }
  .col-name  { width: 200px; }

  .wave-label-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .waveform {
    width: 190px;
    height: 36px;
    border-radius: 4px;
    background: var(--bg);
    cursor: pointer;
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  tbody tr:hover { background: var(--hover); }
  tbody tr.selected { background: rgba(74, 158, 255, 0.12); }

  td {
    padding: 6px 8px;
    font-size: 13px;
    vertical-align: middle;
  }

  .idx { color: var(--text-dim); font-size: 12px; }

  .play-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.15s;
  }

  .play-btn:hover { opacity: 0.8; }
  .play-btn.playing { background: var(--unlabeled); }

  .file-name {
    font-size: 12px;
    color: var(--text-dim);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* 라벨 버튼 */
  .label-btns {
    display: flex;
    gap: 4px;
  }

  .label-btn {
    padding: 4px 14px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 12px;
    transition: all 0.15s;
  }

  .label-btn:hover { border-color: var(--text); color: var(--text); }
  .label-btn.active-good      { border-color: var(--good); color: var(--good); background: rgba(46, 204, 113, 0.15); }
  .label-btn.active-bad        { border-color: var(--bad); color: var(--bad); background: rgba(231, 76, 60, 0.15); }
  .label-btn.active-unlabeled  { border-color: var(--unlabeled); color: var(--unlabeled); background: rgba(240, 165, 0, 0.15); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    font-size: 14px;
  }

  .toast-container {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .toast {
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 12px;
    animation: fadeIn 0.2s, fadeOut 0.3s 2.5s forwards;
    max-width: 320px;
  }

  .toast.success { background: var(--good); color: #000; }
  .toast.error   { background: var(--bad); color: #fff; }

  @keyframes fadeIn  { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
</style>
</head>
<body>

<!-- 상단 바 -->
<div class="toolbar">
  <label>서버</label>
  <input type="text" id="server-url" value="http://localhost:9880" placeholder="http://localhost:9880">
  <div class="toolbar-right">
    <span class="badge good"      id="cnt-good">0</span>
    <span class="badge bad"        id="cnt-bad">0</span>
    <span class="badge unlabeled"  id="cnt-unlabeled">0</span>
  </div>
</div>

<!-- 필터 바 -->
<div class="filter-bar">
  <button class="active" data-filter="all">전체</button>
  <button data-filter="good">Good</button>
  <button data-filter="bad">Bad</button>
  <button data-filter="unlabeled">Unlabeled</button>
  <span class="shortcut-hint">
    <kbd>G</kbd> Good
    <kbd>B</kbd> Bad
    <kbd>U</kbd> Unlabeled
    <kbd>Space</kbd> 재생
    <kbd>↑</kbd><kbd>↓</kbd> 이동
  </span>
</div>

<!-- 메인 -->
<div class="container">
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="col-idx">#</th>
          <th class="col-play"></th>
          <th class="col-wave">파형 / 라벨</th>
          <th class="col-name">파일명</th>
        </tr>
      </thead>
      <tbody id="file-body"></tbody>
    </table>
    <div class="empty-state" id="empty-msg">서버에 연결하면 파일 목록이 표시됩니다.</div>
  </div>
</div>

<!-- 토스트 -->
<div class="toast-container" id="toasts"></div>

<!-- 숨겨진 오디오 -->
<audio id="audio-player" style="display:none"></audio>

<script>
const $ = (s) => document.querySelector(s);
const $$ = (s) => document.querySelectorAll(s);

let BASE = '';
let files = [];
let currentFilter = 'all';
let selectedIndex = -1;
let playingName = '';
const audio = $('#audio-player');
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const waveCache = new Map();
let waveObserver = null;

// ── 유틸 ──

function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  return fetch(BASE + path, opts).then(r => {
    if (!r.ok) return r.json().then(e => Promise.reject(e));
    return r.json();
  });
}

function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  $('#toasts').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── 초기화 ──

$('#server-url').addEventListener('change', init);

document.addEventListener('DOMContentLoaded', init);

async function init() {
  BASE = $('#server-url').value.replace(/\/+$/, '');
  try {
    await loadFiles();
    toast('서버 연결됨');
  } catch {
    toast('서버 연결 실패', 'error');
  }
}

// ── 파일 로드 ──

async function loadFiles() {
  const data = await api('GET', '/quality/files');
  files = data.files || [];
  updateCounts(data.counts || {});
  renderFiles();
}

function updateCounts(counts) {
  $('#cnt-good').textContent = counts.good || 0;
  $('#cnt-bad').textContent = counts.bad || 0;
  $('#cnt-unlabeled').textContent = counts.unlabeled || 0;
}

// ── 필터 ──

$$('.filter-bar button').forEach(btn => {
  btn.addEventListener('click', () => {
    $$('.filter-bar button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    selectedIndex = -1;
    renderFiles();
  });
});

// ── 렌더 ──

function getFiltered() {
  return currentFilter === 'all'
    ? files
    : files.filter(f => f.label === currentFilter);
}

function renderFiles() {
  const body = $('#file-body');
  const filtered = getFiltered();

  if (filtered.length === 0) {
    body.innerHTML = '';
    $('#empty-msg').style.display = 'block';
    $('#empty-msg').textContent = files.length === 0
      ? 'import된 파일이 없습니다.'
      : `${currentFilter} 라벨의 파일이 없습니다.`;
    return;
  }

  $('#empty-msg').style.display = 'none';

  body.innerHTML = filtered.map((f, i) => `
    <tr data-name="${escHtml(f.name)}" data-idx="${i}" class="${i === selectedIndex ? 'selected' : ''}">
      <td class="idx">${i}</td>
      <td>
        <button class="play-btn ${playingName === f.name ? 'playing' : ''}"
                data-play-name="${escHtml(f.name)}" title="재생">
          ${playingName === f.name ? '■' : '▶'}
        </button>
      </td>
      <td>
        <div class="wave-label-group">
          <canvas class="waveform" data-wave-name="${escHtml(f.name)}"
                  width="190" height="36"
                  data-play-name="${escHtml(f.name)}"></canvas>
          <div class="label-btns">
            <button class="label-btn ${f.label === 'good' ? 'active-good' : ''}"
                    data-label-name="${escHtml(f.name)}" data-label="good">Good</button>
            <button class="label-btn ${f.label === 'bad' ? 'active-bad' : ''}"
                    data-label-name="${escHtml(f.name)}" data-label="bad">Bad</button>
            <button class="label-btn ${f.label === 'unlabeled' ? 'active-unlabeled' : ''}"
                    data-label-name="${escHtml(f.name)}" data-label="unlabeled">?</button>
          </div>
        </div>
      </td>
      <td class="file-name" title="${escHtml(f.name)}">${escHtml(f.name)}</td>
    </tr>
  `).join('');

  // 이벤트 위임
  body.querySelectorAll('[data-play-name]').forEach(el => {
    el.addEventListener('click', () => togglePlay(el.dataset.playName));
  });
  body.querySelectorAll('[data-label-name]').forEach(btn => {
    if (btn.dataset.label) {
      btn.addEventListener('click', () => setLabel(btn.dataset.labelName, btn.dataset.label));
    }
  });
  body.querySelectorAll('tr[data-idx]').forEach(tr => {
    tr.addEventListener('click', (e) => {
      if (e.target.closest('.play-btn, .label-btn, .waveform')) return;
      selectedIndex = parseInt(tr.dataset.idx);
      renderFiles();
    });
  });

  observeWaveforms();
}

// ── 파형 ──

function observeWaveforms() {
  if (waveObserver) waveObserver.disconnect();
  waveObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const canvas = entry.target;
      const name = canvas.dataset.waveName;
      waveObserver.unobserve(canvas);
      loadWaveform(name, canvas);
    });
  }, { root: $('.table-wrap'), threshold: 0.1 });

  document.querySelectorAll('.waveform').forEach(c => waveObserver.observe(c));
}

async function loadWaveform(name, canvas) {
  try {
    let buf = waveCache.get(name);
    if (!buf) {
      const res = await fetch(`${BASE}/quality/files/${encodeURIComponent(name)}/audio`);
      const arrayBuf = await res.arrayBuffer();
      buf = await audioCtx.decodeAudioData(arrayBuf);
      waveCache.set(name, buf);
    }
    drawWaveform(canvas, buf);
  } catch {
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = 'rgba(231, 76, 60, 0.3)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#e74c3c';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('decode error', canvas.width / 2, canvas.height / 2 + 3);
  }
}

function drawWaveform(canvas, audioBuffer) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width;
  const h = canvas.height;
  const data = audioBuffer.getChannelData(0);
  const step = Math.ceil(data.length / w);
  const mid = h / 2;

  ctx.clearRect(0, 0, w, h);
  const color = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
  ctx.strokeStyle = color;
  ctx.lineWidth = 1;
  ctx.beginPath();

  for (let i = 0; i < w; i++) {
    const start = i * step;
    let min = 1, max = -1;
    for (let j = 0; j < step && start + j < data.length; j++) {
      const v = data[start + j];
      if (v < min) min = v;
      if (v > max) max = v;
    }
    ctx.moveTo(i, mid + min * mid);
    ctx.lineTo(i, mid + max * mid);
  }
  ctx.stroke();
}

// ── 오디오 재생 ──

function togglePlay(name) {
  if (playingName === name) {
    audio.pause();
    audio.currentTime = 0;
    playingName = '';
    renderFiles();
    return;
  }
  playingName = name;
  audio.src = `${BASE}/quality/files/${encodeURIComponent(name)}/audio`;
  audio.play().catch(() => toast('재생 실패', 'error'));
  renderFiles();
}

audio.addEventListener('ended', () => {
  playingName = '';
  renderFiles();
});

// ── 라벨 변경 ──

async function setLabel(name, label) {
  const file = files.find(f => f.name === name);
  if (file && file.label === label) return;
  try {
    await api('PATCH', `/quality/files/${encodeURIComponent(name)}/label`, { label });
    if (file) file.label = label;
    updateCountsFromFiles();
    renderFiles();
  } catch {
    toast('라벨 변경 실패', 'error');
  }
}

function updateCountsFromFiles() {
  const counts = { good: 0, bad: 0, unlabeled: 0 };
  files.forEach(f => { counts[f.label] = (counts[f.label] || 0) + 1; });
  updateCounts(counts);
}

// ── 키보드 단축키 ──

document.addEventListener('keydown', (e) => {
  // 입력 필드에서는 무시
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

  const filtered = getFiltered();
  if (filtered.length === 0) return;

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    selectedIndex = Math.min(selectedIndex + 1, filtered.length - 1);
    renderFiles();
    scrollToSelected();
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    selectedIndex = Math.max(selectedIndex - 1, 0);
    renderFiles();
    scrollToSelected();
  } else if (e.key === ' ') {
    e.preventDefault();
    if (selectedIndex >= 0 && selectedIndex < filtered.length) {
      togglePlay(filtered[selectedIndex].name);
    }
  } else if (selectedIndex >= 0 && selectedIndex < filtered.length) {
    const name = filtered[selectedIndex].name;
    if (e.key === 'g' || e.key === 'G') {
      setLabel(name, 'good');
      autoAdvance(filtered);
    } else if (e.key === 'b' || e.key === 'B') {
      setLabel(name, 'bad');
      autoAdvance(filtered);
    } else if (e.key === 'u' || e.key === 'U') {
      setLabel(name, 'unlabeled');
    }
  }
});

function autoAdvance(filtered) {
  if (selectedIndex < filtered.length - 1) {
    selectedIndex++;
    setTimeout(() => {
      renderFiles();
      scrollToSelected();
    }, 50);
  }
}

function scrollToSelected() {
  const row = document.querySelector(`tr[data-idx="${selectedIndex}"]`);
  if (row) row.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}
</script>
</body>
</html>
