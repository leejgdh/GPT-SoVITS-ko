# 오디오 전처리
audio:
  sample_rate: 44100
  n_mels: 64
  n_fft: 1024
  hop_length: 512
  target_length: 128      # 시간축 고정 길이 (패딩/트림)

# 학습 설정
training:
  batch_size: 16
  epochs: 50
  learning_rate: 0.001
  weight_decay: 0.0001
  val_ratio: 0.2
  early_stop_patience: 10
  seed: 42

# 데이터 증강
augmentation:
  enabled: true
  time_mask_param: 10
  freq_mask_param: 5
  noise_std: 0.005
  minority_oversample: 5

# 추론
inference:
  model_path: "models/best_model.pth"
  threshold: 0.5

# 서버
service:
  host: "0.0.0.0"
  port: 9890

log_level: "INFO"
